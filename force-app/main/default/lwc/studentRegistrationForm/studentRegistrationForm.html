<template>
    <lightning-card title="Student Registration Form">
        <div class="slds-m-around_medium">
            <lightning-input type="text" label="Student Name" onkeyup={handleNameChange}></lightning-input>
            <lightning-input type="number" label="Roll Number" onkeyup={handleRollNumberChange}></lightning-input>
            <lightning-input label="email" onkeyup={handleEmailChange}></lightning-input>
        </div>
    </lightning-card>

    <lightning-card title="Primitives are reactive">
        <div class="slds-m-around_medium">
            <p>Name : {firstName}</p>
            <p>Roll number : {rollNumber}</p>
            <p>Email : {email}</p>
        </div>
    </lightning-card>

    <lightning-card title="Non primitives are not reactive">
        <div class="slds-m-around_medium">
            <p>Name : {nonPrimitiveData.firstName}</p>
            <p>Roll number : {nonPrimitiveData.rollNumber}</p>
            <p>Email : {nonPrimitiveData.email}</p>
        </div>
    </lightning-card>

    <lightning-card title="Reactive primitives using track">
        <div class="slds-m-around_medium">
            <p>Name : {reactiveNonPrimitive.firstName}</p>
            <p>Roll number : {reactiveNonPrimitive.rollNumber}</p>
            <p>Email : {reactiveNonPrimitive.email}</p>
        </div>
    </lightning-card>


</template>
